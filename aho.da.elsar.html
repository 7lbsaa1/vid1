<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أهو ده اللي صار - سيد درويش</title>
    
    <!-- أيقونة التصفح -->
    <link rel="icon" href="fav.jpg" type="image/jpeg">
    
    <!-- ستايلات المنصة الأساسية -->
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #player-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            pointer-events: none;
        }

        .skeleton-loading {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite linear;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* 🛡️ حجب كلي لشعار يوتيوب المائي */
        #yt-iframe {
            transform: scale(1.08) !important;
            pointer-events: none !important; 
        }

        /* 🎯 الغلاف الذكي لحجب الشعار قبل التشغيل */
        #smart-video-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://img.youtube.com/vi/XTTSUDRf5TQ/maxresdefault.jpg');
            background-size: cover;
            background-position: center;
            z-index: 30; 
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #smart-video-cover .custom-play-img {
            width: 85px;
            height: 85px;
            object-fit: contain;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.6));
        }

        #smart-video-cover:hover .custom-play-img {
            transform: scale(1.12);
        }

        .fade-out-cover {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* 💾 لوحة التحكم المصمتة 100% لحجب الشعار المائي */
        .custom-controls {
            background: #0f172a !important; 
            opacity: 1 !important;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.4);
            padding: 16px 20px;
        }

        /* 🔘 تصميم أزرار الأيقونات الاحترافية الموحدة */
        .control-btn {
            background: transparent;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e2e8f0;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #38bdf8;
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ⏱️ ضبط التايمر لمنع انعكاس التوجيه الرقمي */
        .time-display {
            direction: ltr !important;
            display: inline-flex !important;
            align-items: center;
            gap: 4px;
            font-family: monospace, sans-serif;
            color: #94a3b8;
            user-select: none;
        }

        /* 🎯 إزاحة زر ملء الشاشة حبة لليسار ليظهر كاملاً */
        #fullscreen-btn {
            margin-right: 10px; 
        }

        /* 👑 تنسيق قوائم الـ Premium المنسدلة */
        .premium-dropdown-wrapper {
            position: relative;
            display: inline-block;
        }

        .premium-dropdown-menu {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 5px;
            min-width: 115px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.55);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s, visibility 0.2s;
            z-index: 40;
        }

        .premium-dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) scale(1);
        }

        .premium-dropdown-item {
            padding: 7px 12px;
            color: #94a3b8;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s;
            text-align: left;
        }

        .premium-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .premium-dropdown-item.selected {
            color: #38bdf8;
            font-weight: bold;
            background: rgba(56, 189, 248, 0.1);
        }

        .premium-dropdown-item .check-icon {
            opacity: 0;
        }

        .premium-dropdown-item.selected .check-icon {
            opacity: 1;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="player-container" class="player-wrapper skeleton-loading">
        
        <!-- الغلاف الذكي المخصص -->
        <div id="smart-video-cover">
            <img src="play-button.png" class="custom-play-img" alt="تشغيل">
        </div>

        <div id="loader">جاري تهيئة مسار الصوت...</div>
        <div id="yt-iframe"></div>

        <!-- شريط أزرار التحكم الكلاسيكي المصمت بتوجيه LTR -->
        <div class="custom-controls" dir="ltr">
            
            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-thumb" class="progress-thumb"></div>
                </div>
            </div>

            <div class="controls-row">
                <!-- أزرار الجانب الأيسر -->
                <div class="controls-left">
                    <button id="play-pause-btn" class="control-btn" title="تشغيل / إيقاف (K)">▶</button>
                    <div class="volume-container">
                        <button id="mute-btn" class="control-btn" title="كتم الصوت (M)">🔊</button>
                        <input type="range" id="volume-slider" min="0" max="100" value="100">
                    </div>
                    
                    <div class="time-display">
                        <span id="current-time">00:00</span> / <span id="duration">00:00</span>
                    </div>
                </div>

                <!-- أزرار الجانب الأيمن المطورة -->
                <div class="controls-right">
                    
                    <!-- 💎 زر الجودة (Quality) -->
                    <div class="premium-dropdown-wrapper">
                        <button id="quality-custom-btn" class="control-btn" title="الجودة" style="width: auto; padding: 0 10px; font-size: 0.8rem; font-weight: bold; letter-spacing: 0.3px;">
                            Quality
                        </button>
                        <div id="quality-dropdown-menu" class="premium-dropdown-menu">
                            <div class="premium-dropdown-item selected" data-quality="default">Auto <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="hd1080">1080p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="hd720">720p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="large">480p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="medium">360p <span class="check-icon">✓</span></div>
                        </div>
                    </div>

                    <!-- 🏎️ شكل السرعة الاحترافي (Premium Speed SVG) -->
                    <div class="premium-dropdown-wrapper">
                        <button id="speed-custom-btn" class="control-btn" title="سرعة التشغيل">
                            <svg viewBox="0 0 24 24"><path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.28-10.43zM10.59 15.41a2 2 0 1 0 2.83-2.83 2 2 0 0 0-2.83 2.83zm6.26-6.26l-3.7 3.7a4 4 0 0 1-1.42 1.42l-3.7 3.7 1.42 1.42 3.7-3.7a4 4 0 0 1 1.42-1.42l3.7-3.7-1.42-1.42z"/></svg>
                        </button>
                        <div id="speed-dropdown-menu" class="premium-dropdown-menu">
                            <div class="premium-dropdown-item" data-speed="0.25">0.25x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="0.5">0.5x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="0.75">0.75x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item selected" data-speed="1">Normal <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.25">1.25x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.5">1.5x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.75">1.75x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="2">2x <span class="check-icon">✓</span></div>
                        </div>
                    </div>

                    <!-- عنصر مخفي ومحفوظ لربط ملفات الـ JS الخارجية بكفاءة -->
                    <select id="playback-speed" style="display: none;">
                        <option value="0.25">0.25x</option>
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.75">1.75x</option>
                        <option value="2">2x</option>
                    </select>

                    <!-- ⛶ زر ملء الشاشة المطور مع الإزاحة الجانبية الذكية لليسار -->
                    <button id="fullscreen-btn" class="control-btn" title="ملء الشاشة (F)">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.CUSTOM_VIDEO_ID = 'XTTSUDRf5TQ'; 
        window.CUSTOM_STORAGE_KEY = 'vid_progress_aho_da_elsar_sayed_darwish';

        document.getElementById('smart-video-cover').addEventListener('click', function() {
            this.classList.add('fade-out-cover');
            const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
            if (mainPlayer && typeof mainPlayer.playVideo === 'function') {
                mainPlayer.playVideo();
            }
            const playPauseBtn = document.getElementById('play-pause-btn');
            if (playPauseBtn) { playPauseBtn.textContent = '⏸'; }
        });

        document.getElementById('play-pause-btn').addEventListener('click', function() {
            setTimeout(() => {
                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.getPlayerState === 'function') {
                    const state = mainPlayer.getPlayerState();
                    this.textContent = (state === 1) ? '⏸' : '▶';
                }
            }, 60);
        });

        const speedBtn = document.getElementById('speed-custom-btn');
        const speedMenu = document.getElementById('speed-dropdown-menu');
        const qualityBtn = document.getElementById('quality-custom-btn');
        const qualityMenu = document.getElementById('quality-dropdown-menu');
        const nativeSelect = document.getElementById('playback-speed');

        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityMenu.classList.remove('active');
            speedMenu.classList.toggle('active');
        });

        qualityBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speedMenu.classList.remove('active');
            qualityMenu.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            speedMenu.classList.remove('active');
            qualityMenu.classList.remove('active');
        });

        speedMenu.querySelectorAll('.premium-dropdown-item').forEach(item => {
            item.addEventListener('click', function() {
                speedMenu.querySelectorAll('.premium-dropdown-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                
                const speedVal = this.getAttribute('data-speed');
                if(nativeSelect) {
                    nativeSelect.value = speedVal;
                    nativeSelect.dispatchEvent(new Event('change'));
                }

                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.setPlaybackRate === 'function') {
                    mainPlayer.setPlaybackRate(parseFloat(speedVal));
                }
            });
        });

        qualityMenu.querySelectorAll('.premium-dropdown-item').forEach(item => {
            item.addEventListener('click', function() {
                qualityMenu.querySelectorAll('.premium-dropdown-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                
                const qualityVal = this.getAttribute('data-quality');
                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.setPlaybackQuality === 'function') {
                    mainPlayer.setPlaybackQuality(qualityVal);
                }
            });
        });

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/utils.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egyptian Project - منصة حلبسة</title>
    
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        /* تنسيق سريع لشاشة التحميل والشكل العام للصفحة */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: bold;
        }
        .skeleton-loading {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite linear;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div id="player-container" class="player-wrapper skeleton-loading">
        
        <div id="loader">جاري تهيئة المشغل...</div>

        <div id="yt-iframe"></div>

        <div class="custom-controls">
            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-thumb" class="progress-thumb"></div>
                </div>
            </div>

            <div class="controls-row">
                <div class="controls-left">
                    <button id="play-pause-btn" class="control-btn" title="تشغيل / إيقاف (K)">▶</button>
                    <div class="volume-container">
                        <button id="mute-btn" class="control-btn" title="كتم الصوت (M)">🔊</button>
                        <input type="range" id="volume-slider" min="0" max="100" value="100">
                    </div>
                    <div class="time-display">
                        <span id="current-time">00:00</span> / <span id="duration">00:00</span>
                    </div>
                </div>

                <div class="controls-right">
                    <select id="playback-speed" class="control-select" title="سرعة التشغيل">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    <button id="pip-btn" class="control-btn" title="صورة في صورة">⛶</button>
                    <button id="theater-btn" class="control-btn" title="وضع المسرح (T)">🎦</button>
                    <button id="fullscreen-btn" class="control-btn" title="ملء الشاشة (F)">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // قم بتغيير هذا الـ ID إلى الـ ID الحقيقي الخاص بفيديو Egyptian Project
        window.CUSTOM_VIDEO_ID = 'sp4yamTUNrw'; 
        
        // مفتاح الذاكرة (مهم جداً لكي لا يختلط وقت هذا الفيديو مع فيديو الفيزياء)
        window.CUSTOM_STORAGE_KEY = 'vid_progress_egyptian_project';
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script src="js/utils.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>

</body>
</html>

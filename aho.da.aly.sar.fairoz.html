<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أهو ده اللي صار - فيروز</title>
    
    <!-- أيقونة التصفح -->
    <link rel="icon" href="fav.jpg" type="image/jpeg">
    
    <!-- ملفات التنسيق الأساسية -->
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #111827, #030712);
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 🎬 حاوية المشغل الاحترافية */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: #38bdf8;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
            pointer-events: none;
        }

        /* حجب هوامش وشعارات يوتيوب أثناء التشغيل */
        #yt-iframe {
            width: 100%;
            height: 100%;
            transform: scale(1.04) !important;
            pointer-events: none !important; 
        }

        /* 🎯 الغلاف الذكي الحاحب لشعار يوتيوب */
        #smart-video-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://img.youtube.com/vi/aoYDq-meq1w/maxresdefault.jpg');
            background-size: cover;
            background-position: center;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
        }

        #smart-video-cover .custom-play-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s;
            filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.5));
        }

        #smart-video-cover:hover .custom-play-img {
            transform: scale(1.12);
            filter: drop-shadow(0 0 25px rgba(56, 189, 248, 0.6)) drop-shadow(0 12px 24px rgba(0, 0, 0, 0.7));
        }

        .fade-out-cover {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* 🎛️ واجهة التحكم المطورة بالكامل (Premium Glassmorphism Controls) */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(3, 7, 18, 0.95) 0%, rgba(3, 7, 18, 0.7) 70%, transparent 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 24px 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 25;
            opacity: 1;
            transition: opacity 0.3s ease;
            box-sizing: border-box;
        }

        /* ⏱️ شريط التقدم الزمني الحديث */
        .progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.16);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s ease;
        }

        .progress-container:hover {
            height: 7px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0284c7, #38bdf8);
            border-radius: 10px;
            position: relative;
            width: 0%;
        }

        .progress-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 13px;
            height: 13px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-container:hover .progress-thumb {
            transform: translateY(-50%) scale(1);
        }

        /* محاذاة أزرار التحكم */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 16px; /* مسافات موحدة ومريحة تجربة المستخدم */
        }

        /* 🔘 تصميم أزرار التحكم الموحد */
        .control-btn {
            background: transparent;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e2e8f0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #38bdf8;
            transform: translateY(-1px);
        }

        .control-btn:active {
            transform: scale(0.92); /* تأثير الضغط اللمسي */
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 🔊 حاوية الصوت الذكية */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 75px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.1s;
        }

        #volume-slider:hover::-webkit-slider-thumb {
            transform: scale(1.2);
            background: #38bdf8;
        }

        /* 🔢 إصلاح مشكلة عداد الوقت المعكوس في واجهات RTL وثبات الأرقام */
        .time-display {
            color: #94a3b8;
            font-size: 0.85rem;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 4px;
            user-select: none;
            pointer-events: none;
        }
        
        .time-display span {
            display: inline-block;
            min-width: 35px;
            text-align: center;
        }

        /* 👑 حاوية القوائم المنسدلة الاحترافية المخصصة */
        .premium-dropdown-wrapper {
            position: relative;
        }

        .premium-dropdown-menu {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 6px;
            min-width: 125px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease, visibility 0.2s;
            z-index: 40;
        }

        .premium-dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) scale(1);
        }

        .premium-dropdown-item {
            padding: 8px 12px;
            color: #94a3b8;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s ease;
            text-align: left;
        }

        .premium-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .premium-dropdown-item.selected {
            color: #38bdf8;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.08);
        }

        .premium-dropdown-item .check-icon {
            font-size: 0.8rem;
            opacity: 0;
        }

        .premium-dropdown-item.selected .check-icon {
            opacity: 1;
        }

        /* 📱 تحسين الاستجابة والتوافق الكامل مع كافة الشاشات */
        @media (max-width: 600px) {
            .custom-controls {
                padding: 12px 14px;
                gap: 10px;
            }
            .controls-left { gap: 10px; }
            .controls-right { gap: 10px; }
            #volume-slider { width: 50px; }
            .time-display { font-size: 0.75rem; }
            .control-btn { width: 34px; height: 34px; }
            #smart-video-cover .custom-play-img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="player-container" class="player-wrapper skeleton-loading">
        
        <!-- 🖼️ الغلاف الذكي المحسن بمظهر عصري -->
        <div id="smart-video-cover">
            <img src="play-button.png" class="custom-play-img" alt="Play Music">
        </div>

        <div id="loader">جاري تهيئة مسار الصوت...</div>
        <div id="yt-iframe"></div>

        <!-- 🎛️ لوحة تحكم التوجيه الصارم لضمان عدم انعكاس الأيقونات -->
        <div class="custom-controls" dir="ltr">
            
            <!-- خط الزمن العلوي للوحة التحكم -->
            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-thumb" class="progress-thumb"></div>
                </div>
            </div>

            <div class="controls-row">
                <!-- أزرار التحكم اليسرى -->
                <div class="controls-left">
                    <button id="play-pause-btn" class="control-btn" title="تشغيل / إيقاف (K)">
                        <!-- أيقونة تشغيل افتراضية SVG -->
                        <svg id="svg-play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    
                    <div class="volume-container">
                        <button id="mute-btn" class="control-btn" title="كتم الصوت (M)">
                            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        </button>
                        <input type="range" id="volume-slider" min="0" max="100" value="100">
                    </div>

                    <!-- ⏱️ عداد الوقت المحاذى لليسار بشكل هندسي ثابت لا يقبل الانعكاس -->
                    <div class="time-display">
                        <span id="current-time">00:00</span>
                        <b style="color: rgba(255,255,255,0.2); font-weight: normal;">/</b>
                        <span id="duration">00:00</span>
                    </div>
                </div>

                <!-- أزرار التحكم اليمنى -->
                <div class="controls-right">
                    
                    <!-- 💎 زر قائمة الجودة الفاخر (Quality Dropdown) -->
                    <div class="premium-dropdown-wrapper">
                        <button id="quality-custom-btn" class="control-btn" title="الجودة" style="width: auto; padding: 0 8px; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.3px;">
                            Quality
                        </button>
                        <div id="quality-dropdown-menu" class="premium-dropdown-menu">
                            <div class="premium-dropdown-item selected" data-quality="default">Auto <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="hd1080">1080p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="hd720">720p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="large">480p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="medium">360p <span class="check-icon">✓</span></div>
                        </div>
                    </div>

                    <!-- 🏎️ زر قائمة السرعة الفاخر (Speed Dropdown) -->
                    <div class="premium-dropdown-wrapper">
                        <button id="speed-custom-btn" class="control-btn" title="سرعة التشغيل">
                            <svg viewBox="0 0 24 24"><path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.28-10.43zM10.59 15.41a2 2 0 1 0 2.83-2.83 2 2 0 0 0-2.83 2.83zm6.26-6.26l-3.7 3.7a4 4 0 0 1-1.42 1.42l-3.7 3.7 1.42 1.42 3.7-3.7a4 4 0 0 1 1.42-1.42l3.7-3.7-1.42-1.42z"/></svg>
                        </button>
                        <div id="speed-dropdown-menu" class="premium-dropdown-menu">
                            <div class="premium-dropdown-item" data-speed="0.25">0.25x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="0.5">0.5x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="0.75">0.75x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item selected" data-speed="1">Normal <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.25">1.25x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.5">1.5x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.75">1.75x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="2">2x <span class="check-icon">✓</span></div>
                        </div>
                    </div>

                    <!-- عنصر مخفي كلياً لضمان عدم تعطل ملفات الـ JS الخارجية التي تبحث عن القائمة القديمة -->
                    <select id="playback-speed" style="display: none;">
                        <option value="0.25">0.25x</option>
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.75">1.75x</option>
                        <option value="2">2x</option>
                    </select>

                    <button id="theater-btn" class="control-btn" title="وضع المسرح (T)">
                        <svg viewBox="0 0 24 24"><path d="M19 6H5c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 10H5V8h14v8z"/></svg>
                    </button>
                    
                    <button id="fullscreen-btn" class="control-btn" title="ملء الشاشة (F)">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 🛠️ الأنظمة المتقدمة والتفاعل المخصص لتجربة المستخدم -->
    <script>
        window.CUSTOM_VIDEO_ID = 'aoYDq-meq1w'; 
        window.CUSTOM_STORAGE_KEY = 'vid_progress_aho_da_elsar_fairoz';

        // تشغيل الفيديو وإخفاء الغلاف الذكي بنقرة انسيابية
        document.getElementById('smart-video-cover').addEventListener('click', function() {
            this.classList.add('fade-out-cover');
            
            // محاولة تشغيل آمنة تدعم كافة مسارات السكريبتات المحملة
            const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
            if (mainPlayer && typeof mainPlayer.playVideo === 'function') {
                mainPlayer.playVideo();
            }
            
            // تحويل أيقونة التشغيل السفلى تلقائياً إلى أيقونة إيقاف مؤقت متطورة
            document.getElementById('svg-play-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        });

        // مراقبة نقرات أزرار التشغيل لتحديث الأيقونات الرسومية ديناميكياً
        document.getElementById('play-pause-btn').addEventListener('click', function() {
            setTimeout(() => {
                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.getPlayerState === 'function') {
                    const state = mainPlayer.getPlayerState();
                    // 1 تعني يعمل، 2 تعني مؤقت
                    if (state === 1) {
                        document.getElementById('svg-play-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                    } else {
                        document.getElementById('svg-play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
                    }
                }
            }, 50);
        });

        /* 👑 إدارة القوائم المنسدلة الاحترافية (Premium Dropdowns Logic) */
        const speedBtn = document.getElementById('speed-custom-btn');
        const speedMenu = document.getElementById('speed-dropdown-menu');
        const qualityBtn = document.getElementById('quality-custom-btn');
        const qualityMenu = document.getElementById('quality-dropdown-menu');
        const nativeSelect = document.getElementById('playback-speed');

        // فتح وإغلاق القوائم
        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityMenu.classList.remove('active');
            speedMenu.classList.toggle('active');
        });

        qualityBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speedMenu.classList.remove('active');
            qualityMenu.classList.toggle('active');
        });

        // إغلاق ذكي عند النقر خارج القوائم المفتوحة
        document.addEventListener('click', () => {
            speedMenu.classList.remove('active');
            qualityMenu.classList.remove('active');
        });

        // معالجة اختيار السرعة ومزامنتها مع يوتيوب والـ Select المخفي
        speedMenu.querySelectorAll('.premium-dropdown-item').forEach(item => {
            item.addEventListener('click', function() {
                speedMenu.querySelectorAll('.premium-dropdown-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                
                const speedVal = this.getAttribute('data-speed');
                
                // مزامنة الـ Native Select لتفادي كسر السكريبت الخارجي
                if(nativeSelect) {
                    nativeSelect.value = speedVal;
                    nativeSelect.dispatchEvent(new Event('change'));
                }

                // تنفيذ مباشر على مشغل يوتيوب
                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.setPlaybackRate === 'function') {
                    mainPlayer.setPlaybackRate(parseFloat(speedVal));
                }
            });
        });

        // معالجة اختيار جودة الفيديو بدون التأثير على استقرار المشغل
        qualityMenu.querySelectorAll('.premium-dropdown-item').forEach(item => {
            item.addEventListener('click', function() {
                qualityMenu.querySelectorAll('.premium-dropdown-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                
                const qualityVal = this.getAttribute('data-quality');
                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.setPlaybackQuality === 'function') {
                    mainPlayer.setPlaybackQuality(qualityVal);
                }
            });
        });

        /* 🛡️ الحماية الصارمة للمطورين وقفل الاختصارات بجميع الطرق */
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });
    </script>

    <!-- استدعاء سكريبتات المشغل الأساسية لضمان الأداء الكامل والربط المتناسق -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/utils.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>

</body>
</html>

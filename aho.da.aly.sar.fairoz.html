<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أهو ده اللي صار - فيروز</title>
    
    <!-- أيقونة التصفح -->
    <link rel="icon" href="fav.jpg" type="image/jpeg">
    
    <!-- ستايلات المنصة الأساسية -->
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            overflow: hidden;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            pointer-events: none;
        }

        .skeleton-loading {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite linear;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* 🛡️ حجب كلي لشعار يوتيوب: زيادة التكبير لدفعه خلف الشريط السفلي المصمت */
        #yt-iframe {
            transform: scale(1.08) !important;
            pointer-events: none !important; 
        }

        /* 🎯 الغلاف الذكي الحاحب لشعار يوتيوب قبل التشغيل */
        #smart-video-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://img.youtube.com/vi/aoYDq-meq1w/maxresdefault.jpg');
            background-size: cover;
            background-position: center;
            z-index: 30; 
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #smart-video-cover .custom-play-img {
            width: 85px;
            height: 85px;
            object-fit: contain;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.6));
        }

        #smart-video-cover:hover .custom-play-img {
            transform: scale(1.12);
        }

        .fade-out-cover {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* 💾 العودة للشكل القديم المصمت 100% لمنع تسريب شعار يوتيوب نهائياً */
        .custom-controls {
            background: #0f172a !important; /* لون داكن مصمت تماماً يحجب ما خلفه */
            opacity: 1 !important;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }

        /* ⏱️ إصلاح تايمر الوقت ومنع انعكاس الأرقام في واجهة الـ RTL */
        .time-display {
            direction: ltr !important;
            display: inline-flex !important;
            align-items: center;
            gap: 4px;
            font-family: monospace, sans-serif;
            user-select: none;
        }

        /* 👑 تصميم القوائم المنسدلة الحديثة (Premium Dropdowns) */
        .premium-dropdown-wrapper {
            position: relative;
            display: inline-block;
        }

        .premium-dropdown-menu {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 4px;
            min-width: 110px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: transform 0.2s ease, opacity 0.2s ease, visibility 0.2s;
            z-index: 40;
        }

        .premium-dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) scale(1);
        }

        .premium-dropdown-item {
            padding: 6px 12px;
            color: #94a3b8;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s;
            text-align: left;
        }

        .premium-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .premium-dropdown-item.selected {
            color: var(--primary-color, #38bdf8);
            font-weight: bold;
            background: rgba(56, 189, 248, 0.1);
        }

        .premium-dropdown-item .check-icon {
            opacity: 0;
        }

        .premium-dropdown-item.selected .check-icon {
            opacity: 1;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="player-container" class="player-wrapper skeleton-loading">
        
        <!-- 🖼️ الغلاف الذكي للحجب البدئي -->
        <div id="smart-video-cover">
            <img src="play-button.png" class="custom-play-img" alt="تشغيل">
        </div>

        <div id="loader">جاري تهيئة مسار الصوت...</div>
        <div id="yt-iframe"></div>

        <!-- شريط التحكم السفلي (بالشكل القديم والاتجاه الصارم LTR للمشغلات العالمية) -->
        <div class="custom-controls" dir="ltr">
            
            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar">
                    <div id="progress-thumb" class="progress-thumb"></div>
                </div>
            </div>

            <div class="controls-row">
                <div class="controls-left">
                    <button id="play-pause-btn" class="control-btn" title="تشغيل / إيقاف (K)">▶</button>
                    <div class="volume-container">
                        <button id="mute-btn" class="control-btn" title="كتم الصوت (M)">🔊</button>
                        <input type="range" id="volume-slider" min="0" max="100" value="100">
                    </div>
                    <!-- العداد الذكي المصلح والمحاذى بانتظام -->
                    <div class="time-display">
                        <span id="current-time">00:00</span> / <span id="duration">00:00</span>
                    </div>
                </div>

                <div class="controls-right">
                    
                    <!-- 💎 زر الجودة الحديث (Quality) -->
                    <div class="premium-dropdown-wrapper">
                        <button id="quality-custom-btn" class="control-btn" title="الجودة" style="width: auto; padding: 0 8px; font-size: 0.8rem; font-weight: bold;">
                            Quality
                        </button>
                        <div id="quality-dropdown-menu" class="premium-dropdown-menu">
                            <div class="premium-dropdown-item selected" data-quality="default">Auto <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="hd1080">1080p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="hd720">720p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="large">480p <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-quality="medium">360p <span class="check-icon">✓</span></div>
                        </div>
                    </div>

                    <!-- 🏎️ زر وقائمة السرعة المتطورة المخصصة (Premium Speed) -->
                    <div class="premium-dropdown-wrapper">
                        <button id="speed-custom-btn" class="control-btn" title="سرعة التشغيل">⚡</button>
                        <div id="speed-dropdown-menu" class="premium-dropdown-menu">
                            <div class="premium-dropdown-item" data-speed="0.25">0.25x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="0.5">0.5x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="0.75">0.75x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item selected" data-speed="1">Normal <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.25">1.25x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.5">1.5x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="1.75">1.75x <span class="check-icon">✓</span></div>
                            <div class="premium-dropdown-item" data-speed="2">2x <span class="check-icon">✓</span></div>
                        </div>
                    </div>

                    <!-- الـ Select الخارجي المخفي تماماً لضمان عدم كسر السكريبتات المرتبطة به -->
                    <select id="playback-speed" style="display: none;">
                        <option value="0.25">0.25x</option>
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.75">1.75x</option>
                        <option value="2">2x</option>
                    </select>

                    <!-- تم إزالة زر النافذة العائمة وزر المسرح بنجاح وثبات -->
                    <button id="fullscreen-btn" class="control-btn" title="ملء الشاشة (F)">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- الإعدادات والربط البرمجي السلس -->
    <script>
        window.CUSTOM_VIDEO_ID = 'aoYDq-meq1w'; 
        window.CUSTOM_STORAGE_KEY = 'vid_progress_aho_da_elsar_fairoz';

        // تفعيل تشغيل الغلاف الذكي
        document.getElementById('smart-video-cover').addEventListener('click', function() {
            this.classList.add('fade-out-cover');

            const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
            if (mainPlayer && typeof mainPlayer.playVideo === 'function') {
                mainPlayer.playVideo();
            }

            const playPauseBtn = document.getElementById('play-pause-btn');
            if (playPauseBtn) { playPauseBtn.textContent = '⏸'; }
        });

        // مزامنة حالة الأزرار النصية الكلاسيكية عند النقر
        document.getElementById('play-pause-btn').addEventListener('click', function() {
            setTimeout(() => {
                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.getPlayerState === 'function') {
                    const state = mainPlayer.getPlayerState();
                    this.textContent = (state === 1) ? '⏸' : '▶';
                }
            }, 60);
        });

        /* 🔄 تشغيل القوائم المنسدلة الذكية المضافة حديثاً */
        const speedBtn = document.getElementById('speed-custom-btn');
        const speedMenu = document.getElementById('speed-dropdown-menu');
        const qualityBtn = document.getElementById('quality-custom-btn');
        const qualityMenu = document.getElementById('quality-dropdown-menu');
        const nativeSelect = document.getElementById('playback-speed');

        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityMenu.classList.remove('active');
            speedMenu.classList.toggle('active');
        });

        qualityBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speedMenu.classList.remove('active');
            qualityMenu.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            speedMenu.classList.remove('active');
            qualityMenu.classList.remove('active');
        });

        // تشغيل واختيار السرعات المخصصة ومزامنتها
        speedMenu.querySelectorAll('.premium-dropdown-item').forEach(item => {
            item.addEventListener('click', function() {
                speedMenu.querySelectorAll('.premium-dropdown-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                
                const speedVal = this.getAttribute('data-speed');
                if(nativeSelect) {
                    nativeSelect.value = speedVal;
                    nativeSelect.dispatchEvent(new Event('change'));
                }

                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.setPlaybackRate === 'function') {
                    mainPlayer.setPlaybackRate(parseFloat(speedVal));
                }
            });
        });

        // تشغيل واختيار الجودة المطلوبة
        qualityMenu.querySelectorAll('.premium-dropdown-item').forEach(item => {
            item.addEventListener('click', function() {
                qualityMenu.querySelectorAll('.premium-dropdown-item').forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                
                const qualityVal = this.getAttribute('data-quality');
                const mainPlayer = window.player || (typeof player !== 'undefined' ? player : null);
                if (mainPlayer && typeof mainPlayer.setPlaybackQuality === 'function') {
                    mainPlayer.setPlaybackQuality(qualityVal);
                }
            });
        });

        /* 🛡️ حماية الكود المصدري ومنع اختصارات الفحص */
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });
    </script>

    <!-- استدعاء ملفات تشغيل وحماية المنصة المدمجة بنجاح وثبات -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/utils.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>

</body>
</html>

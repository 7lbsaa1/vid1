<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | منصة حلبسة الرقمية</title>
    
    <link rel="stylesheet" href="css/themes.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, transparent 50%);
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            background: var(--gradient-title);
            -webkit-background-clip: text;
            color: transparent;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .cards-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            width: 280px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
        }

        .card:hover {
            border-color: var(--card-hover-border);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.15);
            background: rgba(30, 41, 59, 0.7);
        }

        .card-icon {
            font-size: 50px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
        }

        .card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>منصة 7lbsaa الرقمية</h1>
        <p>اختر المحتوى للبدء في تجربة العرض والموسيقى المخصصة</p>
    </div>

    <div class="cards-grid">
        <a href="Egyptian-Project.html" class="card">
            <div class="card-icon">🎬</div>
            <h3>Egyptian Project</h3>
            <p>عرض تقديمي متطور</p>
        </a>

        <a href="aho.da.elsar.html" class="card">
            <div class="card-icon">🎧</div>
            <h3>أهو ده اللي صار</h3>
            <p>مشغل الموسيقى المخصص</p>
        </a>
    </div>

</body>
</html>

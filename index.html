<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | منصة 7lbsaa الرقمية</title>
    
    <link rel="stylesheet" href="css/themes.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, transparent 50%);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            background: var(--gradient-title);
            -webkit-background-clip: text;
            color: transparent;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .cards-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1100px;
            width: 100%;
        }

        /* تصميم الكارت الجديد ليدعم الصور */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 300px;
            overflow: hidden; /* لضمان عدم خروج الصورة عن الحواف المنحنية */
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: var(--card-hover-border);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.2);
            background: rgba(30, 41, 59, 0.8);
        }

        /* حاوية الصورة وصورة يوتيوب المصغرة */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* نسبة 16:9 */
            overflow: hidden;
            background: #000;
        }

        .card-image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .card-image-wrapper img {
            transform: scale(1.08); /* تكبير الصورة برفق عند تمرير الماوس */
        }

        /* أيقونة التشغيل العائمة فوق الصورة */
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid var(--primary-color);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* نصوص الكارت */
        .card-content {
            padding: 20px;
            text-align: center;
        }

        .card h3 {
            margin: 0 0 8px 0;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        .card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>منصة 7lbsaa الرقمية</h1>
        <p>مكتبة العرض والموسيقى المخصصة</p>
    </div>

    <div class="cards-grid">
        <a href="Egyptian-Project.html" class="card">
            <div class="card-image-wrapper">
                <img src="https://img.youtube.com/vi/C4UKWmUFBxQ/hqdefault.jpg" alt="Egyptian Project" loading="lazy">
                <div class="play-overlay">▶</div>
            </div>
            <div class="card-content">
                <h3>Egyptian Project</h3>
                <p>عرض تقديمي متطور</p>
            </div>
        </a>

        <a href="aho.da.elsar.html" class="card">
            <div class="card-image-wrapper">
                <img src="https://img.youtube.com/vi/XTTSUDRf5TQ/hqdefault.jpg" alt="سيد درويش" loading="lazy">
                <div class="play-overlay">▶</div>
            </div>
            <div class="card-content">
                <h3>أهو ده اللي صار - سيد درويش</h3>
                <p>موسيقى تراثية</p>
            </div>
        </a>

        <a href="aho.da.aly.sar.fairoz.html" class="card">
            <div class="card-image-wrapper">
                <img src="https://img.youtube.com/vi/aoYDq-meq1w/hqdefault.jpg" alt="فيروز" loading="lazy">
                <div class="play-overlay">▶</div>
            </div>
            <div class="card-content">
                <h3>أهو ده اللي صار - فيروز</h3>
                <p>بصوت جارة القمر</p>
            </div>
        </a>
    </div>

</body>
</html>

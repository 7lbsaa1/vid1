<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | منصة 7lbsaa الرقمية</title>
    
    <!-- 📌 أيقونة التصفح (Tab Favicon) -->
    <link rel="icon" href="fav.jpg" type="image/jpeg">
    <link rel="shortcut icon" href="fav.jpg" type="image/jpeg">
    
    <!-- استدعاء ملف الألوان الأساسي للمنصة -->
    <link rel="stylesheet" href="css/themes.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, transparent 60%);
            overflow-x: hidden;
            position: relative;
            /* 🛡️ حماية أساسية: منع تحديد النصوص أو نسخها */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* 🖼️ لوجو المنصة في أعلى يمين الصفحة */
        .top-right-logo {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 65px;
            height: 65px;
            border-radius: 14px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
            animation: fadeIn 1s ease-out forwards;
        }

        .top-right-logo:hover {
            transform: scale(1.08) rotate(5deg);
            border-color: var(--primary-color);
        }

        /* 🎬 حركات الأنيميشن عند فتح الصفحة (Fluid Entry Animations) */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-fade-up {
            opacity: 0;
            animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* فوارق زمنية تمنح الواجهة طابعاً ديناميكياً فاخراً */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        .delay-4 { animation-delay: 0.55s; }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            background: var(--gradient-title);
            -webkit-background-clip: text;
            color: transparent;
            font-size: 3.2rem;
            margin: 0 0 12px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.15rem;
            margin: 0;
        }

        .cards-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1100px;
            width: 100%;
        }

        /* تصميم الكروت بتأثير الزجاج المظلم */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 310px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s, 
                        box-shadow 0.4s, 
                        background-color 0.4s;
        }

        .card:hover {
            border-color: var(--card-hover-border);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 22px 40px rgba(56, 189, 248, 0.18);
            background: rgba(30, 41, 59, 0.8);
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
            background: #040711;
        }

        .card-image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .card-image-wrapper img {
            transform: scale(1.06);
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: rgba(15, 23, 42, 0.85);
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            padding-left: 4px;
            box-sizing: border-box;
        }

        .card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            color: #fff;
            background: var(--primary-color);
        }

        .card-content {
            padding: 24px;
            text-align: center;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            transition: color 0.3s;
        }

        .card:hover .card-content h3 {
            color: var(--primary-color);
        }

        .card p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @media screen and (max-width: 650px) {
            .top-right-logo {
                position: relative;
                top: auto;
                right: auto;
                margin-bottom: 25px;
                width: 60px;
                height: 60px;
            }
            body { padding-top: 30px; }
            .header h1 { font-size: 2.3rem; }
        }
    </style>
</head>
<body>

    <!-- الشعار في أعلى اليمين -->
    <img src="toplogo1.jpg" alt="Logo" class="top-right-logo">

    <!-- العنوان الرئيسي للمنصة -->
    <div class="header animate-fade-up delay-1">
        <h1>منصة 7lbsaa الرقمية</h1>
        <p>مكتبة العرض والموسيقى المخصصة بأحدث أنظمة الأداء والحماية</p>
    </div>

    <!-- شبكة الكروت التفاعلية -->
    <div class="cards-grid">
        
        <!-- الكارت الأول: المشروع المصري -->
        <a href="Egyptian-Project.html" class="card animate-fade-up delay-2">
            <div class="card-image-wrapper">
                <img src="https://img.youtube.com/vi/C4UKWmUFBxQ/hqdefault.jpg" alt="Egyptian Project" loading="lazy">
                <div class="play-overlay">▶</div>
            </div>
            <div class="card-content">
                <h3>Egyptian Project</h3>
                <p>عرض تقديمي متطور ومؤمن</p>
            </div>
        </a>

        <!-- الكارت الثاني: سيد درويش -->
        <a href="aho.da.elsar.html" class="card animate-fade-up delay-3">
            <div class="card-image-wrapper">
                <img src="https://img.youtube.com/vi/XTTSUDRf5TQ/hqdefault.jpg" alt="سيد درويش" loading="lazy">
                <div class="play-overlay">▶</div>
            </div>
            <div class="card-content">
                <h3>أهو ده اللي صار - سيد درويش</h3>
                <p>الألحان الأصيلة والتراث المصري</p>
            </div>
        </a>

        <!-- الكارت الثالث: فيروز -->
        <a href="aho.da.aly.sar.fairoz.html" class="card animate-fade-up delay-4">
            <div class="card-image-wrapper">
                <img src="https://img.youtube.com/vi/aoYDq-meq1w/hqdefault.jpg" alt="فيروز" loading="lazy">
                <div class="play-overlay">▶</div>
            </div>
            <div class="card-content">
                <h3>أهو ده اللي صار - فيروز</h3>
                <p>روائع الموسيقى بصوت جارة القمر</p>
            </div>
        </a>
        
    </div>

    <!-- 🛡️ سكريبت الحماية الفولاذية المطور ضد فتح أدوات المطورين (Anti-DevTools Script) -->
    <script>
        // 1. منع النقر بالزر الأيمن للماوس (Disable Context Menu)
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. منع جميع اختصارات لوحة المفاتيح الخاصة بالمطورين وفحص العناصر (Windows & Mac)
        document.addEventListener('keydown', function(e) {
            // منع مفتاح F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl+Shift+I / Cmd+Alt+I (Inspect Element)
            if ((e.ctrlKey || e.metaKey) && (e.shiftKey || e.altKey) && (e.keyCode === 73 || e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl+Shift+J / Cmd+Alt+J (Console)
            if ((e.ctrlKey || e.metaKey) && (e.shiftKey || e.altKey) && (e.keyCode === 74 || e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl+Shift+C / Cmd+Alt+C (Select element tool)
            if ((e.ctrlKey || e.metaKey) && (e.shiftKey || e.altKey) && (e.keyCode === 67 || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl+U / Cmd+U (عرض كود المصدر - View Source)
            if ((e.ctrlKey || e.metaKey) && (e.keyCode === 85 || e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl+S / Cmd+S (حفظ الصفحة - Save Page)
            if ((e.ctrlKey || e.metaKey) && (e.keyCode === 83 || e.key === 'S' || e.key === 's')) {
                e.preventDefault();
                return false;
            }
        });

        // 3. الفخ البرمجي (Debugger Loop Trick) لمقاومة أدوات فحص المتصفح الخارجية والجانبية
        // الفكرة: بمجرد محاولة فتح أدوات المطور من خيارات المتصفح الجانبية، سيدخل السكريبت في حالة "تجمد ذاتي"
        (function() {
            const block = function() {
                setInterval(function() {
                    const startTime = performance.now();
                    debugger; // يتوقف الكود هنا إجبارياً إذا كانت نافذة المطور مفتوحة
                    const endTime = performance.now();
                    
                    // إذا استغرق تنفيذ سطر debugger أكثر من 100 مللي ثانية، فهذا يعني أن نافذة المطور مفتوحة بالفعل وقامت بإيقاف الكود مؤقتاً
                    if (endTime - startTime > 100) {
                        document.body.innerHTML = `
                            <div style="
                                display:flex; 
                                flex-direction:column;
                                justify-content:center; 
                                align-items:center; 
                                height:100vh; 
                                background-color:#0b0f19; 
                                color:#f8fafc; 
                                font-family:sans-serif; 
                                text-align:center;
                                padding:20px;
                            ">
                                <h1 style="color:#38bdf8; font-size:2.5rem; margin-bottom:10px;">⚠️ حماية برمجية صارمة</h1>
                                <p style="font-size:1.2rem; color:#64748b;">غير مسموح باستخدام أدوات فحص العنصر أو خيارات المطورين على هذه المنصة.</p>
                            </div>
                        `;
                    }
                }, 200);
            };
            try {
                block();
            } catch (err) {}
        })();
    </script>

</body>
</html>
